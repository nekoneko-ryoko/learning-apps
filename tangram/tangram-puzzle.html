<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ピタッ！とあわせる タングラム＆タイルパズル ●▲■</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Kosugi+Maru&display=swap');
        
        body {
            font-family: 'Kosugi Maru', 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #fef9e7;
            background-image: radial-gradient(#fdedc9 1.5px, transparent 1.5px);
            background-size: 24px 24px;
            overflow-x: auto;  /* 横はみ出し時スクロール */
            overflow-y: auto;
            touch-action: pan-x pan-y; /* ページスクロールを許可（play-area内は別途制御） */
        }

        .title-font {
            font-family: 'Cherry Bomb One', sans-serif;
        }

        /* 3Dおもちゃ風の影とボタン */
        .toy-shadow {
            box-shadow: 0 10px 0px #e5d3b3, 0 15px 25px rgba(0,0,0,0.06);
        }
        .toy-btn-pink {
            box-shadow: 0 4px 0px #db2777;
            transition: all 0.1s ease;
        }
        .toy-btn-pink:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #db2777;
        }
        .toy-btn-yellow {
            box-shadow: 0 4px 0px #d97706;
            transition: all 0.1s ease;
        }
        .toy-btn-yellow:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #d97706;
        }

        /* パズルキャンバス的外枠 */
        #play-area {
            position: relative;
            background-color: #ffffff;
            background-image: 
                radial-gradient(#e5e7eb 1.5px, transparent 1.5px);
            background-size: 20px 20px;
            touch-action: none;
        }

        /* ピースのベーススタイル */
        .puzzle-piece {
            position: absolute;
            cursor: grab;
            transform-origin: center center;
            user-select: none;
            touch-action: none;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.15));
            transition: filter 0.15s ease;
        }
        .puzzle-piece:active {
            cursor: grabbing;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
            z-index: 100 !important;
        }

        /* アクティブなピースのスタイル */
        .puzzle-piece.active-piece {
            z-index: 90 !important;
        }

        /* 削除モード時のピーススタイル */
        .delete-mode-active .puzzle-piece:hover {
            filter: drop-shadow(0 0px 8px #ef4444) brightness(0.9);
            cursor: pointer;
        }

        /* くるくる回る回転ハンドルの演出スタイル */
        .rotate-handle {
            transition: background-color 0.2s, transform 0.1s ease;
        }
        .rotate-handle:active {
            background-color: #db2777 !important;
            transform: scale(1.15);
        }

        /* コピーハンドルのアクティブ演出 */
        .copy-handle {
            transition: background-color 0.2s, transform 0.1s ease;
        }
        .copy-handle:active {
            background-color: #d97706 !important;
            transform: scale(0.95);
        }

        /* ピョコンッと出現するポップアップアニメーション */
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between p-3 md:p-6 text-gray-800" oncontextmenu="return false;">

    <!-- ヘッダーエリア -->
    <header class="w-full max-w-6xl flex flex-col md:flex-row items-center justify-between gap-3 mb-3 bg-white/95 p-4 rounded-3xl border-4 border-amber-200 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-pink-400 rounded-2xl flex items-center justify-center text-white text-2xl font-bold border-b-4 border-pink-600 animate-bounce">
                🧩
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold tracking-wider text-pink-500 title-font">
                    ピタッ！と 自由なタングラム
                </h1>
                <p class="text-xs text-amber-600 font-bold">●▲■ つまんでうごかして、ボタンでどんどん図形を増やそう！</p>
            </div>
        </div>

        <!-- コントロールボタン -->
        <div class="flex items-center gap-2 flex-wrap justify-center">
            <!-- 音スイッチ -->
            <button id="sound-toggle" onclick="toggleSound()" class="px-3 py-2 rounded-2xl bg-amber-100 hover:bg-amber-200 text-amber-700 transition-colors flex items-center gap-1 font-bold text-xs border-2 border-amber-300">
                <i id="sound-icon" data-lucide="volume-2" class="w-4 h-4"></i>
                <span>おと: ON</span>
            </button>
            <!-- ぜんぶけす -->
            <button onclick="confirmReset()" class="px-3 py-2 rounded-2xl bg-rose-50 hover:bg-rose-100 text-rose-600 transition-colors flex items-center gap-1 font-bold text-xs border-2 border-rose-200">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
                <span>ぜんぶ片づける</span>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="w-full max-w-6xl flex flex-col lg:flex-row gap-4 items-stretch justify-center flex-grow mb-3">
        
        <!-- パズルキャンバス（プレイエリア） -->
        <div id="canvas-wrapper" class="flex-grow flex flex-col items-center justify-center bg-white p-3 md:p-4 rounded-[2.5rem] border-8 border-amber-300 toy-shadow relative">
            
            <!-- キャンバス本体：縦横460px -->
            <div id="play-area" class="w-full max-w-[460px] aspect-square rounded-2xl overflow-hidden border-4 border-amber-100 shadow-inner relative" onclick="deselectAll(event)">
                
                <!-- リアルタイムに動くピースたちが格納されるコンテナ -->
                <div id="pieces-container" class="absolute inset-0"></div>

                <!-- ガイド枠（中心線） -->
                <div class="absolute inset-0 border border-amber-200/50 pointer-events-none flex items-center justify-center">
                    <div class="w-full h-[1px] bg-dashed border-t border-amber-200/40"></div>
                    <div class="h-full w-[1px] bg-dashed border-l border-amber-200/40 absolute"></div>
                </div>

            </div>

            <!-- 操作ヘルプテキスト -->
            <div class="mt-3 text-center">
                <p class="text-xs font-bold text-amber-800 bg-amber-50 px-4 py-1.5 rounded-full border border-amber-200 inline-block">
                    👈 うごかす / 👆 タップすると「回転」や「ふやす」ボタンが出るよ！ / 🎨 色をタップでぬりかえ！
                </p>
            </div>
        </div>

        <!-- 右側コントロールパネル -->
        <div class="w-full lg:w-96 flex flex-col gap-4 justify-between bg-white/95 p-4 md:p-5 rounded-[2.5rem] border-4 border-amber-200">
            
            <!-- ① ピースを自由に追加する -->
            <div>
                <h2 class="text-xs font-bold text-amber-700 mb-2 flex items-center gap-1">
                    <span class="w-5 h-5 bg-pink-500 rounded-full text-white text-[11px] flex items-center justify-center font-bold">1</span>
                    図形をふやす（何個でも増やせるよ！）
                </h2>
                <div class="grid grid-cols-3 gap-2 bg-amber-50 p-2.5 rounded-2xl border border-amber-200">
                    <button onclick="spawnPiece('tri-large')" class="p-2 rounded-xl bg-white hover:bg-pink-50 border-2 border-amber-200 flex flex-col items-center justify-center pop-hover shadow-sm">
                        <svg class="w-8 h-8 text-red-500 fill-current" viewBox="0 0 100 100"><polygon points="0,0 100,0 0,100"/></svg>
                        <span class="text-[9px] font-bold mt-1 text-gray-700">大さんかく</span>
                    </button>
                    <button onclick="spawnPiece('tri-medium')" class="p-2 rounded-xl bg-white hover:bg-pink-50 border-2 border-amber-200 flex flex-col items-center justify-center pop-hover shadow-sm">
                        <svg class="w-8 h-8 text-green-500 fill-current" viewBox="0 0 100 100"><polygon points="0,0 100,0 0,100"/></svg>
                        <span class="text-[9px] font-bold mt-1 text-gray-700">中さんかく</span>
                    </button>
                    <button onclick="spawnPiece('tri-small')" class="p-2 rounded-xl bg-white hover:bg-pink-50 border-2 border-amber-200 flex flex-col items-center justify-center pop-hover shadow-sm">
                        <svg class="w-8 h-8 text-blue-500 fill-current" viewBox="0 0 100 100"><polygon points="0,0 100,0 0,100"/></svg>
                        <span class="text-[9px] font-bold mt-1 text-gray-700">小さんかく</span>
                    </button>
                    <button onclick="spawnPiece('rect')" class="p-2 rounded-xl bg-white hover:bg-pink-50 border-2 border-amber-200 flex flex-col items-center justify-center pop-hover shadow-sm">
                        <svg class="w-8 h-8 text-amber-500 fill-current" viewBox="0 0 100 100"><rect x="0" y="0" width="100" height="100" rx="3"/></svg>
                        <span class="text-[9px] font-bold mt-1 text-gray-700">しかく</span>
                    </button>
                    <button onclick="spawnPiece('parallelogram')" class="p-2 rounded-xl bg-white hover:bg-pink-50 border-2 border-amber-200 flex flex-col items-center justify-center pop-hover shadow-sm col-span-2">
                        <svg class="w-16 h-8 text-purple-500 fill-current" viewBox="0 0 142 71"><polygon points="71,0 142,0 71,71 0,71"/></svg>
                        <span class="text-[9px] font-bold mt-1 text-gray-700">平行四辺形</span>
                    </button>
                </div>
            </div>

            <!-- ② いろをえらぶ -->
            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <h2 class="text-xs font-bold text-amber-700 flex items-center gap-1">
                        <span class="w-5 h-5 bg-pink-500 rounded-full text-white text-[11px] flex items-center justify-center font-bold">2</span>
                        ピースの色を選ぶ
                    </h2>
                    <label class="flex items-center gap-1 bg-amber-100 px-2 py-0.5 rounded-full border border-amber-300 text-[10px] font-bold text-amber-800 cursor-pointer pop-hover">
                        <span>カスタム🎨</span>
                        <input type="color" id="custom-color-picker" onchange="selectColor(this.value)" class="w-3.5 h-3.5 rounded-md cursor-pointer border-0 bg-transparent">
                    </label>
                </div>
                <!-- ぬりえカラーパレット -->
                <div class="grid grid-cols-6 gap-1.5 bg-amber-50 p-2 rounded-2xl border border-amber-200" id="palette-grid">
                    <!-- JSでパレットが追加されます -->
                </div>
            </div>

            <!-- ③ 図形を個別に消す（ゴミ箱モード） -->
            <div>
                <h2 class="text-xs font-bold text-amber-700 mb-1.5 flex items-center gap-1">
                    <span class="w-5 h-5 bg-pink-500 rounded-full text-white text-[11px] flex items-center justify-center font-bold">3</span>
                    いらない図形をけす
                </h2>
                <button id="btn-delete-mode" onclick="toggleDeleteMode()" class="w-full py-2.5 rounded-xl bg-white border-2 border-rose-300 text-rose-600 font-bold text-xs flex items-center justify-center gap-2 pop-hover shadow-sm">
                    <i data-lucide="eraser" class="w-4 h-4"></i>
                    <span id="delete-mode-text">けしごむモード: OFF</span>
                </button>
            </div>

            <!-- アクションボタン -->
            <div class="flex flex-col gap-2 pt-2 border-t border-amber-100">
                <button onclick="downloadImage()" class="w-full py-3 rounded-2xl bg-pink-500 hover:bg-pink-400 text-white font-bold text-base flex items-center justify-center gap-2 toy-btn-pink">
                    <i data-lucide="download" class="w-5.5 h-5.5"></i>
                    <span>しゃしんを ほぞんする</span>
                </button>
            </div>

        </div>
    </main>

    <!-- フッター -->
    <footer class="text-[10px] text-amber-600 font-bold bg-white/50 px-4 py-1.5 rounded-full border border-amber-200">
        © ピタッ！と自由なタングラムパズル
    </footer>

    <!-- トースト通知 -->
    <div id="toast" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 bg-amber-900/90 text-white font-bold px-4 py-2 rounded-full flex items-center gap-2 shadow-lg transition-all duration-300 z-50 pointer-events-none text-xs">
        <i id="toast-icon" data-lucide="info" class="w-4 h-4 text-amber-300"></i>
        <span id="toast-message">メッセージ</span>
    </div>

    <script>
        // --- 設定状態 ---
        let isSoundOn = true;
        let currentColor = "#ec4899"; // デフォルトピンク
        let isDeleteMode = false;
        let activePieceId = null; // 現在選択中のピースのID
        let spawnCounter = 0; // 追加された回数をカウントする

        // ピース管理配列
        // { id, type, x, y, rotation, color, width, height, svgContent }
        let pieces = [];
        let pieceIdCounter = 0;

        // 重なり選択用：最後にタップした座標と、そこにヒットするピースのサイクル管理
        let lastTapX = null;
        let lastTapY = null;
        let overlapCycleIds = [];   // その座標でヒットするピースIDのリスト
        let overlapCycleIndex = 0;  // 現在選択中のインデックス
        const TAP_SAME_AREA = 20;   // 同じ場所とみなす距離（px）

        // パレットカラー
        const colors = [
            "#ef4444", "#f97316", "#f59e0b", "#eab308", "#84cc16", "#10b981",
            "#06b6d4", "#3b82f6", "#6366f1", "#8b5cf6", "#d946ef", "#ec4899",
            "#ffeaa7", "#b2bec3", "#74b9ff", "#a29bfe", "#ffe1e1", "#ffffff"
        ];

        // スナップ設定
        const SNAP_GRID_SIZE = 5; 
        const SNAP_DISTANCE = 18;  // 角と角、辺と辺の吸着しやすさ距離

        // --- 音声シンセ ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (!isSoundOn) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'snap') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.04);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.06);
                } else if (type === 'rotate') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(330, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.09);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.09);
                } else if (type === 'paint') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(659, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'delete') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) {
                console.log("Audio Error:", e);
            }
        }

        // --- 初期起動 ---
        window.onload = function() {
            lucide.createIcons();
            buildPalette();
            resetToDefaultPieces();
            
            // タッチ時のスクロール防止
            const playArea = document.getElementById("play-area");
            playArea.addEventListener("touchmove", function(e) {
                e.preventDefault();
            }, { passive: false });

            // play-area全体でのクリック・タップを一元管理（重なり選択）
            playArea.addEventListener("mousedown", handlePlayAreaStart, true);
            playArea.addEventListener("touchstart", handlePlayAreaStart, { capture: true, passive: false });

            // Googleサイト等のiframe埋め込み対応：コンテナ幅に合わせてスケーリング
            setupResponsiveScale();
        };

        // --- play-area全体のクリック一元管理（重なり選択の核心） ---
        function handlePlayAreaStart(e) {
            // 回転・コピーハンドルは除外
            if (e.target.closest(".rotate-handle-wrapper")) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            // その座標にヒットするすべてのピースを収集（z-index降順 = 上から順）
            const hitPieces = pieces.filter(p => {
                const el = document.getElementById(p.id);
                return el && isHitOnShape(clientX, clientY, el, p);
            }).reverse(); // pieces配列は追加順なので逆順にすると後に追加した（上の）ものが先頭

            if (hitPieces.length === 0) {
                // 何もない場所をタップ → 選択解除
                deselectAllPieces();
                lastTapX = null;
                lastTapY = null;
                overlapCycleIds = [];
                return;
            }

            // 前回タップと同じ場所かどうか判定
            const isSameSpot = lastTapX !== null &&
                Math.abs(clientX - lastTapX) < TAP_SAME_AREA &&
                Math.abs(clientY - lastTapY) < TAP_SAME_AREA;

            if (isSameSpot && overlapCycleIds.length > 1) {
                // 同じ場所を再タップ → 次のピースへサイクル
                overlapCycleIndex = (overlapCycleIndex + 1) % overlapCycleIds.length;
                const nextId = overlapCycleIds[overlapCycleIndex];
                const nextPiece = pieces.find(p => p.id === nextId);
                if (nextPiece) {
                    selectPieceById(nextId);
                    showToast(`重なった図形を切り替えたよ！（${overlapCycleIndex + 1}/${overlapCycleIds.length}）`, "layers");
                }
                e.stopPropagation();
            } else {
                // 新しい場所をタップ → 一番上のピースを選択
                lastTapX = clientX;
                lastTapY = clientY;
                overlapCycleIds = hitPieces.map(p => p.id);
                overlapCycleIndex = 0;
                selectPieceById(overlapCycleIds[0]);
                // 重なっている場合はヒント表示
                if (overlapCycleIds.length > 1) {
                    showToast(`図形が重なっているよ！もう一度タップで切り替え（${overlapCycleIds.length}枚）`, "layers");
                }
            }
        }

        // IDを指定してピースを選択状態にする
        function selectPieceById(id) {
            deselectAllPieces();
            activePieceId = id;
            const el = document.getElementById(id);
            if (el) {
                el.classList.add("active-piece");
                el.querySelector(".active-ring").classList.remove("hidden");
                el.querySelector(".rotate-handle-wrapper").classList.remove("hidden");
                el.style.zIndex = "90";
            }
        }

        // --- レスポンシブ対応（見切れたらスクロール） ---
        function setupResponsiveScale() {
            // html/body のスクロールを有効化
            document.documentElement.style.overflowX = "auto";
            document.documentElement.style.overflowY = "auto";
            document.body.style.overflowX = "auto";
            document.body.style.overflowY = "auto";
            // ページ全体のタッチスクロールを許可（play-area 内は別途制御済み）
            document.body.style.touchAction = "pan-x pan-y";
        }

        // --- パレット構築 ---
        function buildPalette() {
            const container = document.getElementById("palette-grid");
            container.innerHTML = "";
            colors.forEach(color => {
                const btn = document.createElement("button");
                btn.className = "palette-btn w-full aspect-square rounded-xl border-2 border-transparent shadow-sm relative pop-hover flex items-center justify-center";
                btn.style.backgroundColor = color;
                if (color === "#ffffff") btn.classList.add("border-gray-300");
                btn.onclick = () => selectColor(color);
                
                const check = document.createElement("div");
                check.className = "absolute hidden text-white font-bold select-none text-xs filter drop-shadow";
                check.innerHTML = "✓";
                if (color === "#ffffff" || color === "#ffeaa7") {
                    check.classList.remove("text-white");
                    check.classList.add("text-gray-800");
                }
                btn.appendChild(check);
                btn.dataset.color = color;
                container.appendChild(btn);
            });
            updatePaletteSelection();
        }

        function selectColor(color) {
            currentColor = color;
            updatePaletteSelection();
            document.getElementById("custom-color-picker").value = color;
            if (isDeleteMode) toggleDeleteMode(); // 色を選んだら消しゴムを解除
        }

        function updatePaletteSelection() {
            const btns = document.querySelectorAll(".palette-btn");
            btns.forEach(btn => {
                const check = btn.querySelector("div");
                if (btn.dataset.color === currentColor && !isDeleteMode) {
                    btn.classList.remove("border-transparent");
                    btn.classList.add("border-pink-500", "scale-105");
                    check.classList.remove("hidden");
                } else {
                    btn.classList.add("border-transparent");
                    btn.classList.remove("border-pink-500", "scale-105");
                    check.classList.add("hidden");
                }
            });
        }

        // --- けしごむモードの切替 ---
        function toggleDeleteMode() {
            isDeleteMode = !isDeleteMode;
            const btn = document.getElementById("btn-delete-mode");
            const text = document.getElementById("delete-mode-text");
            const wrapper = document.getElementById("canvas-wrapper");

            if (isDeleteMode) {
                btn.className = "w-full py-2.5 rounded-xl bg-rose-500 text-white font-bold text-xs flex items-center justify-center gap-2 pop-hover shadow-md";
                text.textContent = "けしごむモード: ON";
                wrapper.classList.add("delete-mode-active");
                showToast("けしたい図形をタップしてね！", "eraser");
            } else {
                btn.className = "w-full py-2.5 rounded-xl bg-white border-2 border-rose-300 text-rose-600 font-bold text-xs flex items-center justify-center gap-2 pop-hover shadow-sm";
                text.textContent = "けしごむモード: OFF";
                wrapper.classList.remove("delete-mode-active");
            }
            deselectAllPieces();
            updatePaletteSelection();
        }

        // --- 初期の7つの黄金ピースをきれいに配置 ---
        function resetToDefaultPieces() {
            const container = document.getElementById("pieces-container");
            container.innerHTML = "";
            pieces = [];
            pieceIdCounter = 0;
            activePieceId = null;
            spawnCounter = 0;

            // 大きくて遊びやすい黄金比率の初期タングラムセットを、綺麗に散らして配置
            spawnPieceInternal("tri-large", 20, 20, 0, "#ef4444");      // 大三角1
            spawnPieceInternal("tri-large", 270, 20, 90, "#f97316");    // 大三角2
            spawnPieceInternal("tri-medium", 20, 160, 45, "#10b981");   // 中三角
            spawnPieceInternal("tri-small", 310, 170, 180, "#3b82f6");  // 小三角1
            spawnPieceInternal("tri-small", 310, 260, 270, "#8b5cf6");  // 小三角2
            spawnPieceInternal("rect", 20, 280, 0, "#eab308");          // ましかく
            spawnPieceInternal("parallelogram", 130, 310, 0, "#ec4899"); // 新・黄金平行四辺形
        }

        // --- 図形を自由に追加する ---
        function spawnPiece(type) {
            const staggerOffset = (spawnCounter % 5) * 20 - 40; 
            const rx = 160 + staggerOffset; 
            const ry = 160 + staggerOffset;
            spawnCounter++;

            const rotation = 0; 
            
            const newPiece = spawnPieceInternal(type, rx, ry, rotation, currentColor);
            
            deselectAllPieces();
            activePieceId = newPiece.id;
            const element = document.getElementById(newPiece.id);
            if (element) {
                element.classList.add("active-piece");
                element.querySelector(".active-ring").classList.remove("hidden");
                element.querySelector(".rotate-handle-wrapper").classList.remove("hidden");
                element.style.zIndex = "100"; 
            }

            playSound('snap');
            showToast("新しい図形をだしたよ！✨", "plus-circle");
        }

        // 内部的なピース生成処理
        function spawnPieceInternal(type, x, y, rotation, color) {
            const id = "piece_" + (pieceIdCounter++);
            let width = 80;
            let height = 80;
            let svgContent = "";

            if (type === "rect") {
                width = 71;
                height = 71;
                svgContent = `<polygon points="0,0 71,0 71,71 0,71" fill="${color}" stroke="${color}" stroke-width="1.5" />`;
            } else if (type === "tri-large") {
                width = 141;
                height = 141;
                svgContent = `<polygon points="0,0 141,0 0,141" fill="${color}" stroke="${color}" stroke-width="1.5" />`;
            } else if (type === "tri-medium") {
                width = 100;
                height = 100;
                svgContent = `<polygon points="0,0 100,0 0,100" fill="${color}" stroke="${color}" stroke-width="1.5" />`;
            } else if (type === "tri-small") {
                width = 71;
                height = 71;
                svgContent = `<polygon points="0,0 71,0 0,71" fill="${color}" stroke="${color}" stroke-width="1.5" />`;
            } else if (type === "parallelogram") {
                width = 142;
                height = 71;
                svgContent = `<polygon points="71,0 142,0 71,71 0,71" fill="${color}" stroke="${color}" stroke-width="1.5" />`;
            }

            const pieceData = { id, type, x, y, rotation, color, width, height, svgContent };
            pieces.push(pieceData);

            createPieceDOM(pieceData);
            return pieceData; 
        }

        // ピースを実際に画面に描く
        function createPieceDOM(data) {
            const container = document.getElementById("pieces-container");

            const div = document.createElement("div");
            div.id = data.id;
            div.className = "puzzle-piece";
            div.style.width = data.width + "px";
            div.style.height = data.height + "px";
            div.style.left = data.x + "px";
            div.style.top = data.y + "px";
            div.style.transform = `rotate(${data.rotation}deg)`;

            // タップ選択時に上部左右にピョコッと常時表示される「コントロールボタン」のHTML
            div.innerHTML = `
                <div class="relative w-full h-full animate-pop">
                    <svg class="w-full h-full pointer-events-none" viewBox="0 0 ${data.width} ${data.height}" xmlns="http://www.w3.org/2000/svg">
                        ${data.svgContent}
                    </svg>
                    <!-- 点線のアクティブリング -->
                    <div class="active-ring absolute inset-[-8px] border-2 border-dashed border-pink-400 rounded-lg pointer-events-none hidden"></div>
                    
                    <!-- 【新レイアウト】上部コントロール：左に回転、右にコピー（ふやす） -->
                    <div class="rotate-handle-wrapper absolute top-[-30px] left-0 right-0 flex justify-center gap-4 hidden z-[110] select-none">
                        <!-- くるくるフリー回転ハンドル -->
                        <div class="rotate-handle w-7 h-7 bg-pink-500 hover:bg-pink-400 text-white rounded-full flex items-center justify-center cursor-alias shadow-md">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                        </div>
                        <!-- 【重要】常時表示コピーボタン：長押しを完全に廃止し、ここを押すだけで複製可能に -->
                        <div class="copy-handle w-7 h-7 bg-amber-500 hover:bg-amber-400 text-white rounded-full flex items-center justify-center cursor-pointer shadow-md" onclick="event.stopPropagation(); copyPiece('${data.id}');">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </div>

            `;

            setupDragAndClick(div, data);
            container.appendChild(div);

        }

        // 全ピースの選択状態をクリア
        function deselectAllPieces() {
            activePieceId = null;
            overlapCycleIds = [];
            overlapCycleIndex = 0;
            lastTapX = null;
            lastTapY = null;
            const allPieces = document.querySelectorAll(".puzzle-piece");
            allPieces.forEach(p => {
                p.classList.remove("active-piece");
                p.querySelector(".active-ring").classList.add("hidden");
                p.querySelector(".rotate-handle-wrapper").classList.add("hidden");
            });
        }

        // キャンバスの背景タップで選択解除
        function deselectAll(e) {
            if (e.target.id === "play-area") {
                deselectAllPieces();
            }
        }

        // ピースを複製（コピー）する処理
        function copyPiece(id) {
            const orig = pieces.find(p => p.id === id);
            if (!orig) return;

            // 少し右下にずらした位置に複製する
            const rx = Math.min(380, orig.x + 25);
            const ry = Math.min(380, orig.y + 25);
            const newPiece = spawnPieceInternal(orig.type, rx, ry, orig.rotation, orig.color);

            // 新しくコピーした図形をそのまま自動的に選択状態にする
            deselectAllPieces();
            activePieceId = newPiece.id;
            const element = document.getElementById(newPiece.id);
            if (element) {
                element.classList.add("active-piece");
                element.querySelector(".active-ring").classList.remove("hidden");
                element.querySelector(".rotate-handle-wrapper").classList.remove("hidden");
                element.style.zIndex = "100"; // コピーした図形を一番手前に持ってくる
            }

            playSound('snap');
            showToast("図形をコピーしたよ！📋", "copy");
        }

        // --- ポリゴンの実際の形に当たっているか判定（Point-in-Polygon） ---
        function getPolygonPoints(data) {
            // ローカル座標でのポリゴン頂点を返す
            if (data.type === "rect") {
                return [{x:0,y:0},{x:data.width,y:0},{x:data.width,y:data.height},{x:0,y:data.height}];
            } else if (data.type === "tri-large" || data.type === "tri-medium" || data.type === "tri-small") {
                return [{x:0,y:0},{x:data.width,y:0},{x:0,y:data.height}];
            } else if (data.type === "parallelogram") {
                return [{x:data.width/2,y:0},{x:data.width,y:0},{x:data.width/2,y:data.height},{x:0,y:data.height}];
            }
            // フォールバック（全面）
            return [{x:0,y:0},{x:data.width,y:0},{x:data.width,y:data.height},{x:0,y:data.height}];
        }

        // Ray-casting法によるポイントインポリゴン判定
        function pointInPolygon(px, py, polygon) {
            let inside = false;
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].x, yi = polygon[i].y;
                const xj = polygon[j].x, yj = polygon[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        // クリック点がピースの実際の図形の中に入っているか（回転考慮）
        function isHitOnShape(clientX, clientY, element, data) {
            const rect = element.getBoundingClientRect();
            // 図形の中心
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            // 回転を逆算してローカル座標に変換
            const rad = -(data.rotation * Math.PI) / 180;
            const dx = clientX - cx;
            const dy = clientY - cy;
            const localX = dx * Math.cos(rad) - dy * Math.sin(rad) + data.width / 2;
            const localY = dx * Math.sin(rad) + dy * Math.cos(rad) + data.height / 2;
            // 少し余白を持たせる（タッチ操作を考慮して4px）
            const polygon = getPolygonPoints(data);
            // 余白付きで判定
            const expanded = polygon.map(p => ({
                x: p.x + (p.x < data.width / 2 ? -4 : 4),
                y: p.y + (p.y < data.height / 2 ? -4 : 4)
            }));
            return pointInPolygon(localX, localY, polygon);
        }

        // ドラッグ移動＆回転の処理（長押し判定は100%削除）
        function setupDragAndClick(element, data) {
            let startX = 0;
            let startY = 0;
            let origX = 0;
            let origY = 0;
            let hasDragged = false;
            let activeTouchId = null;

            // 回転操作の状態
            let isRotating = false;
            let startAngle = 0;
            let origRotation = 0;

            const rotateHandleWrapper = element.querySelector(".rotate-handle-wrapper");
            const rotateHandle = element.querySelector(".rotate-handle");

            // --- 図形本体のドラッグ処理（選択はplay-area側のhandlePlayAreaStartが担当） ---
            function onStart(e) {
                // 実際の図形の形（ポリゴン）の中に当たっているか確認
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                if (!isHitOnShape(clientX, clientY, element, data)) {
                    return;
                }

                // 消しゴムモードならタップで即削除（play-area側より先に処理）
                if (isDeleteMode) {
                    deletePiece(data.id);
                    e.preventDefault();
                    e.stopPropagation();
                    return;
                }

                // 選択されていないピースのドラッグは無視（先にタップで選択してから動かす）
                if (activePieceId !== data.id) {
                    return;
                }

                hasDragged = false;

                startX = clientX;
                startY = clientY;
                origX = data.x;
                origY = data.y;

                element.style.zIndex = "100";

                if (e.touches) {
                    activeTouchId = e.touches[0].identifier;
                    document.addEventListener("touchmove", onMove, { passive: false });
                    document.addEventListener("touchend", onEnd);
                } else {
                    document.addEventListener("mousemove", onMove);
                    document.addEventListener("mouseup", onEnd);
                }
            }

            function onMove(e) {
                if (isDeleteMode || isRotating) return;
                
                let clientX, clientY;
                if (e.touches) {
                    let touch = null;
                    for (let t of e.touches) {
                        if (t.identifier === activeTouchId) {
                            touch = t;
                            break;
                        }
                    }
                    if (!touch) return;
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const dx = clientX - startX;
                const dy = clientY - startY;

                if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
                    hasDragged = true;
                }

                let newX = origX + dx;
                let newY = origY + dy;

                const playArea = document.getElementById("play-area");
                const limitX = playArea.clientWidth - data.width / 2;
                const limitY = playArea.clientHeight - data.height / 2;
                newX = Math.max(-data.width / 2, Math.min(newX, limitX));
                newY = Math.max(-data.height / 2, Math.min(newY, limitY));

                data.x = newX;
                data.y = newY;

                element.style.left = newX + "px";
                element.style.top = newY + "px";
            }

            function onEnd(e) {
                if (e.touches) {
                    document.removeEventListener("touchmove", onMove);
                    document.removeEventListener("touchend", onEnd);
                } else {
                    document.removeEventListener("mousemove", onMove);
                    document.removeEventListener("mouseup", onEnd);
                }

                element.style.zIndex = "10";

                // ドラッグした場合はスナップ処理、タップ（未ドラッグ）は色塗り
                if (hasDragged && !isDeleteMode) {
                    applySnap(data, element);
                } else if (!hasDragged && !isDeleteMode) {
                    paintPiece(data, element);
                }
            }

            // --- 回転ハンドルのくるくるドラッグ処理 ---
            function onRotateStart(e) {
                e.stopPropagation(); 
                isRotating = true;

                const rect = element.getBoundingClientRect();
                const playAreaRect = document.getElementById("play-area").getBoundingClientRect();
                const cx = (rect.left + rect.width / 2) - playAreaRect.left;
                const cy = (rect.top + rect.height / 2) - playAreaRect.top;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const mx = clientX - playAreaRect.left;
                const my = clientY - playAreaRect.top;

                startAngle = Math.atan2(my - cy, mx - cx);
                origRotation = data.rotation;

                if (e.touches) {
                    document.addEventListener("touchmove", onRotateMove, { passive: false });
                    document.addEventListener("touchend", onRotateEnd);
                } else {
                    document.addEventListener("mousemove", onRotateMove);
                    document.addEventListener("mouseup", onRotateEnd);
                }
            }

            function onRotateMove(e) {
                if (!isRotating) return;
                e.preventDefault();

                const rect = element.getBoundingClientRect();
                const playAreaRect = document.getElementById("play-area").getBoundingClientRect();
                const cx = (rect.left + rect.width / 2) - playAreaRect.left;
                const cy = (rect.top + rect.height / 2) - playAreaRect.top;

                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const mx = clientX - playAreaRect.left;
                const my = clientY - playAreaRect.top;

                const currentAngle = Math.atan2(my - cy, mx - cx);
                const angleDiff = currentAngle - startAngle;

                let degreeChange = angleDiff * (180 / Math.PI);
                
                let newRot = (origRotation + degreeChange) % 360;
                if (newRot < 0) newRot += 360;

                data.rotation = newRot;
                element.style.transform = `rotate(${newRot}deg)`;
            }

            function onRotateEnd(e) {
                isRotating = false;
                if (e.touches) {
                    document.removeEventListener("touchmove", onRotateMove);
                    document.removeEventListener("touchend", onRotateEnd);
                } else {
                    document.removeEventListener("mousemove", onRotateMove);
                    document.removeEventListener("mouseup", onRotateEnd);
                }

                const snappedRot = Math.round(data.rotation / 45) * 45;
                data.rotation = snappedRot % 360;
                element.style.transform = `rotate(${data.rotation}deg)`;
                
                playSound('rotate');
                applySnap(data, element); 
            }

            // イベントの登録
            element.addEventListener("mousedown", onStart);
            element.addEventListener("touchstart", onStart, { passive: false });

            // 回転ハンドル
            rotateHandle.addEventListener("mousedown", onRotateStart);
            rotateHandle.addEventListener("touchstart", onRotateStart, { passive: false });
        }

        // ピースを個別削除する
        function deletePiece(id) {
            pieces = pieces.filter(p => p.id !== id);
            const el = document.getElementById(id);
            if (el) el.remove();
            
            playSound('delete');
            showToast("図形を1かけら けしました🗑️", "trash");
        }

        // ピースの色塗り替え
        function paintPiece(data, element = null) {
            data.color = currentColor;
            
            if (data.type === "rect") {
                data.svgContent = `<polygon points="0,0 71,0 71,71 0,71" fill="${currentColor}" stroke="${currentColor}" stroke-width="1.5" />`;
            } else if (data.type === "tri-large") {
                data.svgContent = `<polygon points="0,0 141,0 0,141" fill="${currentColor}" stroke="${currentColor}" stroke-width="1.5" />`;
            } else if (data.type === "tri-medium") {
                data.svgContent = `<polygon points="0,0 100,0 0,100" fill="${currentColor}" stroke="${currentColor}" stroke-width="1.5" />`;
            } else if (data.type === "tri-small") {
                data.svgContent = `<polygon points="0,0 71,0 0,71" fill="${currentColor}" stroke="${currentColor}" stroke-width="1.5" />`;
            } else if (data.type === "parallelogram") {
                data.svgContent = `<polygon points="71,0 142,0 71,71 0,71" fill="${currentColor}" stroke="${currentColor}" stroke-width="1.5" />`;
            }

            const targetEl = element || document.getElementById(data.id);
            if (targetEl) {
                targetEl.querySelector("svg").innerHTML = data.svgContent;
            }
            playSound('paint');
        }

        // --- 進化した角あわせ＆吸着スナップ（ピタッと吸い寄せ） ---
        function applySnap(data, element) {
            let snapped = false;

            const getPieceCorners = (p) => {
                const cx = p.x + p.width / 2;
                const cy = p.y + p.height / 2;
                const rad = (p.rotation * Math.PI) / 180;
                const cos = Math.cos(rad);
                const sin = Math.sin(rad);

                let localCorners = [];
                if (p.type === "rect") {
                    localCorners = [
                        {x: -p.width/2, y: -p.height/2}, {x: p.width/2, y: -p.height/2},
                        {x: p.width/2, y: p.height/2}, {x: -p.width/2, y: p.height/2}
                    ];
                } else if (p.type === "tri-large" || p.type === "tri-small" || p.type === "tri-medium") {
                    localCorners = [
                        {x: -p.width/2, y: -p.height/2}, {x: p.width/2, y: -p.height/2},
                        {x: -p.width/2, y: p.height/2}
                    ];
                } else if (p.type === "parallelogram") {
                    localCorners = [
                        {x: 0, y: -p.height/2}, {x: p.width/2, y: -p.height/2},
                        {x: 0, y: p.height/2}, {x: -p.width/2, y: p.height/2}
                    ];
                }

                return localCorners.map(pt => {
                    return {
                        x: cx + (pt.x * cos - pt.y * sin),
                        y: cy + (pt.x * sin + pt.y * cos)
                    };
                });
            };

            const myCorners = getPieceCorners(data);

            for (let other of pieces) {
                if (other.id === data.id) continue;

                const otherCorners = getPieceCorners(other);

                for (let myPt of myCorners) {
                    for (let otherPt of otherCorners) {
                        const dist = Math.sqrt(Math.pow(myPt.x - otherPt.x, 2) + Math.pow(myPt.y - otherPt.y, 2));

                        if (dist < SNAP_DISTANCE) {
                            const offsetX = otherPt.x - myPt.x;
                            const offsetY = otherPt.y - myPt.y;

                            data.x += offsetX;
                            data.y += offsetY;
                            snapped = true;
                            break;
                        }
                    }
                    if (snapped) break;
                }
                if (snapped) break;
            }

            if (!snapped) {
                const gridX = Math.round(data.x / SNAP_GRID_SIZE) * SNAP_GRID_SIZE;
                const gridY = Math.round(data.y / SNAP_GRID_SIZE) * SNAP_GRID_SIZE;
                if (Math.abs(data.x - gridX) < 10 && Math.abs(data.y - gridY) < 10) {
                    data.x = gridX;
                    data.y = gridY;
                }
            }

            element.style.left = data.x + "px";
            element.style.top = data.y + "px";

            if (snapped) {
                playSound('snap');
            }
        }

        // --- 音声オンオフ ---
        function toggleSound() {
            isSoundOn = !isSoundOn;
            const icon = document.getElementById("sound-icon");
            const btn = document.getElementById("sound-toggle");
            
            if (isSoundOn) {
                icon.setAttribute("data-lucide", "volume-2");
                btn.querySelector("span").textContent = "おと: ON";
                btn.className = "px-3 py-2 rounded-2xl bg-amber-100 hover:bg-amber-200 text-amber-700 transition-colors flex items-center gap-1 font-bold text-xs border-2 border-amber-300";
            } else {
                icon.setAttribute("data-lucide", "volume-x");
                btn.querySelector("span").textContent = "おと: OFF";
                btn.className = "px-3 py-2 rounded-2xl bg-gray-100 hover:bg-gray-200 text-gray-500 transition-colors flex items-center gap-1 font-bold text-xs border-2 border-gray-300";
            }
            lucide.createIcons();
        }

        function confirmReset() {
            resetToDefaultPieces();
            if (isDeleteMode) toggleDeleteMode();
            showToast("ピースを初期ならびにリセットしました！", "rotate-ccw");
        }

        // 写真保存
        function downloadImage() {
            const canvas = document.createElement("canvas");
            canvas.width = 460;
            canvas.height = 460;
            const ctx = canvas.getContext("2d");

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, 460, 460);

            ctx.fillStyle = "#f3f4f6";
            for (let x = 10; x < 460; x += 20) {
                for (let y = 10; y < 460; y += 20) {
                    ctx.beginPath();
                    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            pieces.forEach(p => {
                ctx.save();

                const cx = p.x + p.width / 2;
                const cy = p.y + p.height / 2;
                ctx.translate(cx, cy);
                ctx.rotate((p.rotation * Math.PI) / 180);
                ctx.translate(-p.width / 2, -p.height / 2);

                ctx.fillStyle = p.color;
                ctx.strokeStyle = p.color; 
                ctx.lineWidth = 1.5;
                ctx.beginPath();

                if (p.type === "rect") {
                    ctx.rect(0, 0, 71, 71);
                } else if (p.type === "tri-large") {
                    ctx.moveTo(0, 0); ctx.lineTo(141, 0); ctx.lineTo(0, 141);
                } else if (p.type === "tri-medium") {
                    ctx.moveTo(0, 0); ctx.lineTo(100, 0); ctx.lineTo(0, 100);
                } else if (p.type === "tri-small") {
                    ctx.moveTo(0, 0); ctx.lineTo(71, 0); ctx.lineTo(0, 71);
                } else if (p.type === "parallelogram") {
                    ctx.moveTo(71, 0); ctx.lineTo(142, 0); ctx.lineTo(70.5, 71); ctx.lineTo(1.5, 71);
                }

                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                ctx.restore();
            });

            try {
                const link = document.createElement("a");
                link.download = `tangram-art-${Date.now()}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                showToast("作品をパソコンやスマホに保存しました！💾", "download-cloud");
            } catch (err) {
                showToast("保存に失敗しちゃいました…", "alert-circle");
                console.error(err);
            }
        }

        function showToast(message, iconName = "info") {
            const toast = document.getElementById("toast");
            const toastMsg = document.getElementById("toast-message");
            const toastIcon = document.getElementById("toast-icon");

            toastMsg.textContent = message;
            toastIcon.setAttribute("data-lucide", iconName);
            lucide.createIcons();

            toast.classList.remove("translate-y-20", "opacity-0");
            toast.classList.add("translate-y-0", "opacity-100");

            setTimeout(() => {
                toast.classList.remove("translate-y-0", "opacity-100");
                toast.classList.add("translate-y-20", "opacity-0");
            }, 3000);
        }
    </script>
</body>
</html>
