<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>学習ツールブック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --mat:#FFD53D;
    --mat-dot:#ffcb1a;
    --ink:#3a2e12;
    --ink-soft:#7a6a3a;
    --white:#fffdf5;

    --v-orange:#FF9142;
    --v-orange-dk:#e0742a;
    --v-teal:#31C9BF;
    --v-teal-dk:#1fa79e;
    --v-coral:#FF5D5D;
    --v-coral-dk:#df3f3f;
    --v-green:#8BC93F;
    --v-green-dk:#6ba824;
    --v-pink:#FF7CB6;
    --v-pink-dk:#e35a97;
    --v-blue:#4D9DE0;
    --v-blue-dk:#2f7cc0;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    background-color:var(--mat);
    background-image:radial-gradient(var(--mat-dot) 3px, transparent 3.5px);
    background-size:38px 38px;
    min-height:100vh;
    padding:44px 20px 60px;
  }

  .sheet{ max-width:1020px; margin:0 auto; }

  /* ===== Title as building blocks ===== */
  .cover{ text-align:center; margin-bottom:16px; }
  .blocks{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:22px;
  }
  .block{
    width:54px;height:54px;
    border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:26px;
    color:#fff;
    border:3px solid rgba(255,255,255,.55);
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,.4),
      inset 0 -5px 0 rgba(0,0,0,.15),
      0 6px 0 rgba(0,0,0,.12);
    position:relative;
  }
  .block.c1{ background:var(--v-coral); }
  .block.c2{ background:var(--v-orange); }
  .block.c3{ background:var(--v-teal); }
  .block.c4{ background:var(--v-blue); }
  .block.c5{ background:var(--v-green); }
  .block.c6{ background:var(--v-pink); }
  .block:nth-child(odd){ transform:rotate(-3deg); }
  .block:nth-child(even){ transform:rotate(3deg); }

  .cover p{
    font-size:14.5px;
    color:var(--ink-soft);
    font-weight:700;
    letter-spacing:.5px;
    margin:0 0 40px;
  }

  /* ===== Toy cards grid ===== */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:34px 26px;
  }

  .toy{
    text-decoration:none;
    color:#fff;
    display:block;
    position:relative;
    padding:40px 20px 26px;
    border-radius:26px;
    border:4px solid rgba(255,255,255,.5);
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.35),
      inset 0 -8px 0 rgba(0,0,0,.14),
      0 10px 0 rgba(0,0,0,.14),
      0 14px 22px rgba(0,0,0,.18);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .toy:nth-child(1){ background:var(--v-orange); }
  .toy:nth-child(2){ background:var(--v-teal); }
  .toy:nth-child(3){ background:var(--v-coral); }
  .toy:nth-child(4){ background:var(--v-green); }

  .toy:hover{
    transform:translateY(4px);
    box-shadow:
      inset 0 4px 0 rgba(255,255,255,.35),
      inset 0 -4px 0 rgba(0,0,0,.14),
      0 6px 0 rgba(0,0,0,.14),
      0 8px 14px rgba(0,0,0,.18);
  }
  .toy:focus-visible{ outline:4px solid #fff; outline-offset:3px; }

  .stud{
    position:absolute;
    top:-16px; left:50%;
    transform:translateX(-50%);
    width:34px;height:20px;
    border-radius:14px 14px 0 0;
    background:inherit;
    border:4px solid rgba(255,255,255,.5);
    border-bottom:none;
  }
  .stud::after{
    content:"";
    position:absolute;
    inset:3px 3px auto;
    height:6px;
    border-radius:10px 10px 0 0;
    background:rgba(255,255,255,.35);
  }

  .icon-badge{
    width:76px;height:76px;
    border-radius:50%;
    background:var(--white);
    display:flex;align-items:center;justify-content:center;
    font-size:36px;
    margin:0 auto 16px;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.08), 0 4px 8px rgba(0,0,0,.18);
  }

  .toy h2{
    font-family:'Kosugi Maru', sans-serif;
    font-size:18px;
    text-align:center;
    margin:0 0 10px;
    text-shadow:0 2px 0 rgba(0,0,0,.12);
  }
  .toy p{
    font-size:12.5px;
    line-height:1.7;
    text-align:center;
    margin:0 0 18px;
    min-height:52px;
    opacity:.95;
  }

  .go{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    width:fit-content;
    margin:0 auto;
    background:var(--white);
    color:var(--ink);
    font-family:'Kosugi Maru', sans-serif;
    font-weight:700;
    font-size:13px;
    padding:8px 22px;
    border-radius:20px;
    box-shadow:0 3px 0 rgba(0,0,0,.15);
  }
  .go::before{ content:"▶"; font-size:10px; }

  @media (max-width:520px){
    .block{ width:44px; height:44px; font-size:20px; border-radius:10px; }
    .toy{ transform:none !important; }
  }
  @media (prefers-reduced-motion:reduce){ .toy{ transition:none; } }
</style>
</head>
<body>
  <div class="sheet">

    <div class="cover">
      <div class="blocks">
        <div class="block c1">学</div>
        <div class="block c2">習</div>
        <div class="block c3">ツ</div>
        <div class="block c4">ー</div>
        <div class="block c5">ル</div>
        <div class="block c6">ブ</div>
        <div class="block c1">ッ</div>
        <div class="block c3">ク</div>
      </div>
      <p>すきなアプリをえらんでね</p>
    </div>

    <div class="grid">
      <a class="toy" href="./flipbook/flipbook.html">
        <div class="stud"></div>
        <div class="icon-badge">🎬</div>
        <h2>パラパラ漫画メーカー</h2>
        <p>コマを描いて<br>じぶんだけのアニメを作ろう</p>
        <span class="go">あそぶ</span>
      </a>

      <a class="toy" href="./kana/kana-writing.html">
        <div class="stud"></div>
        <div class="icon-badge">✍️</div>
        <h2>かな文字トレーサー</h2>
        <p>ひらがな・カタカナを<br>ただしいじゅんで書く練習</p>
        <span class="go">あそぶ</span>
      </a>

      <a class="toy" href="./tangram/tangram-puzzle.html">
        <div class="stud"></div>
        <div class="icon-badge">🧩</div>
        <h2>タングラムパズル</h2>
        <p>7つのピースで<br>いろいろな形を作ろう</p>
        <span class="go">あそぶ</span>
      </a>

      <a class="toy" href="./dot-art/dot-art-maker.html">
        <div class="stud"></div>
        <div class="icon-badge">🎨</div>
        <h2>ドット絵エディタ</h2>
        <p>マスを塗って<br>自分だけの絵を作ろう</p>
        <span class="go">あそぶ</span>
      </a>
    </div>

  </div>
</body>
</html>
