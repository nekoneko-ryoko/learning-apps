<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>がくしゅうシールブック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@500;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6EFDD;
    --paper-fleck:#e9dfc4;
    --ink:#3B2F22;
    --ink-soft:#6b5c47;
    --stamp-red:#c8493a;
    --c-flip:#F2A65A;
    --c-kana:#5FA8D3;
    --c-tan:#E2543D;
    --c-dot:#7FB069;
    --tape:#f4dfa0;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:'Zen Maru Gothic', sans-serif;
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      radial-gradient(var(--paper-fleck) 1px, transparent 1.4px),
      radial-gradient(var(--paper-fleck) 1px, transparent 1.4px);
    background-size:34px 34px, 34px 34px;
    background-position:0 0, 17px 17px;
    min-height:100vh;
    padding:40px 20px 60px;
  }

  .sheet{
    max-width:1000px;
    margin:0 auto;
    position:relative;
  }

  .cover{
    text-align:center;
    margin-bottom:56px;
    position:relative;
  }
  .cover-sticker{
    position:relative;
    display:inline-block;
    padding:34px 52px 26px;
    background:#fffdf7;
    border-radius:44% 56% 51% 49%/53% 47% 53% 47%;
    box-shadow:
      0 0 0 5px #fffdf7,
      0 0 0 6px rgba(59,47,34,.12),
      0 10px 24px rgba(59,47,34,.18);
    transform:rotate(-1.2deg);
  }
  .cover h1{
    font-family:'Kosugi Maru', sans-serif;
    font-size:clamp(28px,4.6vw,42px);
    margin:0 0 6px;
    letter-spacing:2px;
    position:relative;
    display:inline-block;
    line-height:1.3;
  }
  .cover h1 .dot{ color:var(--stamp-red); }
  .cover p{
    margin:20px 0 0;
    font-size:14px;
    color:var(--ink-soft);
    letter-spacing:1px;
  }
  .cover .sub-stamp{
    display:inline-block;
    margin-top:14px;
    font-family:'Special Elite', monospace;
    font-size:11px;
    letter-spacing:3px;
    color:var(--ink-soft);
    border:1.5px dashed #b9ab8a;
    padding:4px 14px;
    border-radius:20px;
    transform:rotate(-1deg);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
    gap:34px 26px;
    padding:0 6px 20px;
  }

  .sticker{
    position:relative;
    text-decoration:none;
    color:var(--ink);
    display:block;
    padding:26px 18px 22px;
    background:#fffdf7;
    border-radius:255px 15px 225px 15px/15px 225px 15px 255px;
    box-shadow:
      0 0 0 5px #fffdf7,
      0 0 0 6px rgba(59,47,34,.12),
      3px 10px 18px rgba(59,47,34,.18);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .sticker:nth-child(1){ transform:rotate(-3deg); }
  .sticker:nth-child(2){ transform:rotate(2.2deg); }
  .sticker:nth-child(3){ transform:rotate(-2deg); }
  .sticker:nth-child(4){ transform:rotate(3deg); }
  .sticker:hover{
    transform:rotate(0deg) translateY(-6px) scale(1.03);
    box-shadow:
      0 0 0 5px #fffdf7,
      0 0 0 6px rgba(59,47,34,.14),
      4px 16px 26px rgba(59,47,34,.26);
  }
  .sticker:focus-visible{ outline:3px solid var(--stamp-red); outline-offset:4px; }

  .badge{
    width:78px;height:78px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:36px;
    margin:0 auto 14px;
    border:3px solid #fffdf7;
    box-shadow:0 3px 8px rgba(0,0,0,.15) inset, 0 3px 6px rgba(0,0,0,.12);
  }
  .sticker:nth-child(1) .badge{ background:var(--c-flip); }
  .sticker:nth-child(2) .badge{ background:var(--c-kana); }
  .sticker:nth-child(3) .badge{ background:var(--c-tan); }
  .sticker:nth-child(4) .badge{ background:var(--c-dot); }

  .sticker h2{
    font-family:'Kosugi Maru', sans-serif;
    font-size:18px;
    margin:0 0 8px;
    text-align:center;
  }
  .sticker p{
    font-size:12.5px;
    line-height:1.7;
    color:var(--ink-soft);
    margin:0 0 14px;
    text-align:center;
    min-height:56px;
  }
  .play{
    display:block;
    margin:0 auto;
    width:fit-content;
    font-family:'Special Elite', monospace;
    font-size:12px;
    letter-spacing:3px;
    color:var(--stamp-red);
    border:2px solid var(--stamp-red);
    padding:5px 16px;
    border-radius:4px;
    transform:rotate(-2deg);
    position:relative;
  }
  .play::before{ content:"▶ "; }

  @media (max-width:520px){
    body{padding:26px 14px 40px;}
    .sticker{ transform:none !important; }
  }

  @media (prefers-reduced-motion:reduce){
    .sticker{ transition:none; }
  }
</style>
</head>
<body>
  <div class="sheet">

    <div class="cover">
      <div class="cover-sticker">
        <h1>がくしゅう<span class="dot">シール</span>ブック</h1>
        <div class="sub-stamp">TAP TO PLAY</div>
      </div>
      <p>すきなアプリをえらんでね</p>
    </div>

    <div class="grid">
      <a class="sticker" href="./flipbook/flipbook.html">
        <div class="badge">🎬</div>
        <h2>パラパラ漫画メーカー</h2>
        <p>コマを描いて<br>じぶんだけのアニメを作ろう</p>
        <span class="play">START</span>
      </a>

      <a class="sticker" href="./kana/kana-writing.html">
        <div class="badge">✍️</div>
        <h2>かな文字トレーサー</h2>
        <p>ひらがな・カタカナを<br>ただしいじゅんで書く練習</p>
        <span class="play">START</span>
      </a>

      <a class="sticker" href="./tangram/tangram-puzzle.html">
        <div class="badge">🧩</div>
        <h2>タングラムパズル</h2>
        <p>7つのピースで<br>いろいろな形を作ろう</p>
        <span class="play">START</span>
      </a>

      <a class="sticker" href="./dot-art/dot-art-maker.html">
        <div class="badge">🎨</div>
        <h2>ドット絵エディタ</h2>
        <p>マスを塗って<br>自分だけの絵を作ろう</p>
        <span class="play">START</span>
      </a>
  

  </div>
</body>
</html>
