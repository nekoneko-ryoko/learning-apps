<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>学習ツールブック</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    font-family:'Zen Maru Gothic', sans-serif;
    color:#1a1a1a;
    background:#ffffff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }

  .stage{
    max-width:460px;
    width:100%;
    text-align:center;
  }

  .back{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12px;
    color:#999;
    text-decoration:none;
    margin-bottom:30px;
  }
  .back:hover{ color:#1a1a1a; }

  h1{
    font-family:'Kosugi Maru', sans-serif;
    font-size:clamp(26px,6vw,32px);
    margin:0 0 8px;
    letter-spacing:1px;
  }

  .lead{
    font-size:13.5px;
    color:#777;
    margin:0 0 44px;
    letter-spacing:.5px;
  }

  .doors{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .door{
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    color:#1a1a1a;
    padding:18px 22px;
    border:1.5px solid #1a1a1a;
    border-radius:14px;
    transition:background .15s ease, color .15s ease;
    text-align:left;
  }
  .door:hover{ background:#1a1a1a; color:#fff; }
  .door:hover .door-icon{ filter:invert(1); }
  .door:focus-visible{ outline:2px solid #1a1a1a; outline-offset:3px; }

  .door-icon{
    width:30px;height:30px;
    flex-shrink:0;
  }

  .door-text{ flex:1; }
  .door h2{
    font-family:'Kosugi Maru', sans-serif;
    font-size:15.5px;
    margin:0 0 2px;
  }
  .door p{
    font-size:11.5px;
    opacity:.6;
    margin:0;
    line-height:1.5;
  }

  footer{
    margin-top:44px;
    font-size:11px;
    color:#999;
    letter-spacing:.5px;
  }
</style>
</head>
<body>
  <div class="stage">
    <a class="back" href="../">← ねこラボ</a>

    <h1>学習ツールブック</h1>
    <p class="lead">すきなアプリをえらんでね</p>

    <div class="doors">
      <a class="door" href="./flipbook/flipbook.html">
        <svg class="door-icon" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.6">
          <rect x="3" y="5" width="14" height="14" rx="1.5"/>
          <path d="M17 9l4-2v10l-4-2"/>
        </svg>
        <div class="door-text">
          <h2>パラパラ漫画メーカー</h2>
          <p>コマを描いてアニメを作ろう</p>
        </div>
      </a>

      <a class="door" href="./kana/kana-writing.html">
        <svg class="door-icon" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.6">
          <path d="M4 20l4-1 11-11-3-3L5 16l-1 4z"/>
          <path d="M14 6l3 3"/>
        </svg>
        <div class="door-text">
          <h2>かな文字トレーサー</h2>
          <p>ひらがな・カタカナを書く練習</p>
        </div>
      </a>

      <a class="door" href="./tangram/tangram-puzzle.html">
        <svg class="door-icon" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.6">
          <path d="M4 4h8v8H4z"/>
          <path d="M12 4l8 8-8 8V4z"/>
        </svg>
        <div class="door-text">
          <h2>タングラムパズル</h2>
          <p>ピースを組み合わせて形を作ろう</p>
        </div>
      </a>

      <a class="door" href="./dot-art/dot-art-maker.html">
        <svg class="door-icon" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.6">
          <rect x="4" y="4" width="6" height="6"/>
          <rect x="14" y="4" width="6" height="6"/>
          <rect x="4" y="14" width="6" height="6"/>
          <rect x="14" y="14" width="6" height="6"/>
        </svg>
        <div class="door-text">
          <h2>ドット絵エディタ</h2>
          <p>マスを塗って絵を作ろう</p>
        </div>
      </a>
    </div>

    <footer>neko-labo · 学習ツールブック</footer>
  </div>
</body>
</html>
